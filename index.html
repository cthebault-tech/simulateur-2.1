<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Simulateur rentabilité</title>
<style>
body { font-family: Arial; padding: 40px; }
#banner { padding: 15px; border-radius: 10px; font-weight: bold; }
.ok { background:#dcfce7; color:#166534; }
.bad { background:#fee2e2; color:#991b1b; }
</style>
</head>

<body>

<h1>Simulateur rentabilité</h1>

<div id="banner">Chargement...</div>

<script>
let baseData = [];

async function loadData(){
  const banner = document.getElementById("banner");

  try{
    const res = await fetch(
      "https://opensheet.elk.sh/1tiiiWK4RQM_vm97ijUcbovVLDEw1ZwMeiu8P4LK_niY/BDD_trimestrielle"
    );

    if(!res.ok) throw new Error("Erreur HTTP");

    baseData = await res.json();

    if(!baseData.length) throw new Error("Aucune donnée");

    console.log("DATA LOADED", baseData.length);

    banner.innerText = "✅ Base live connectée (" + baseData.length + " lignes)";
    banner.className = "ok";

  }catch(e){
    console.error(e);
    banner.innerText = "❌ Base live indisponible";
    banner.className = "bad";
  }
}

loadData();
</script>

</body>
</html>
